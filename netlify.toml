[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "/api/v1"

# API proxy → VPS (الباك إند + قاعدة البيانات على السيرفر)
[[redirects]]
  from = "/api/*"
  to = "http://128.140.127.179:8788/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
